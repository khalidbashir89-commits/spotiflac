<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1fdf64;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#17b554;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="190"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" stroke="#1fdf64" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#1fdf64" stroke-width="1">
    <line x1="20" y1="200" x2="380" y2="200"/>
    <line x1="200" y1="20" x2="200" y2="380"/>
    <circle cx="200" cy="200" r="100" fill="none"/>
    <circle cx="200" cy="200" r="150" fill="none"/>
  </g>

  <!-- Glowing background orb -->
  <circle cx="200" cy="200" r="80" fill="#1fdf64" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Waveform bars — center piece -->
  <g filter="url(#glow)" clip-path="url(#circle)">
    <rect x="108" y="158" width="14" height="84"  rx="7" fill="url(#accentGrad)" opacity="0.5"/>
    <rect x="128" y="138" width="14" height="124" rx="7" fill="url(#accentGrad)" opacity="0.7"/>
    <rect x="148" y="118" width="14" height="164" rx="7" fill="url(#accentGrad)" opacity="0.85"/>
    <rect x="168" y="100" width="16" height="200" rx="8" fill="url(#accentGrad)"/>
    <rect x="190" y="88"  width="18" height="224" rx="9" fill="url(#accentGrad)"/>
    <rect x="214" y="100" width="16" height="200" rx="8" fill="url(#accentGrad)"/>
    <rect x="236" y="118" width="14" height="164" rx="7" fill="url(#accentGrad)" opacity="0.85"/>
    <rect x="256" y="138" width="14" height="124" rx="7" fill="url(#accentGrad)" opacity="0.7"/>
    <rect x="276" y="158" width="14" height="84"  rx="7" fill="url(#accentGrad)" opacity="0.5"/>
  </g>

  <!-- Download arrow overlay -->
  <g transform="translate(200, 210)" opacity="0.18">
    <polyline points="-22,0 0,26 22,0" fill="none" stroke="#1fdf64" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-30" x2="0" y2="4" stroke="#1fdf64" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Outer ring accent -->
  <circle cx="200" cy="200" r="193" fill="none" stroke="url(#accentGrad)" stroke-width="0.75" stroke-opacity="0.4" stroke-dasharray="6 4"/>
</svg>
