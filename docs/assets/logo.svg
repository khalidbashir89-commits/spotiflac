<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1fdf64;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#17b554;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="190"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" stroke="#1fdf64" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#1fdf64" stroke-width="1">
    <line x1="20" y1="200" x2="380" y2="200"/>
    <line x1="200" y1="20" x2="200" y2="380"/>
    <circle cx="200" cy="200" r="100" fill="none"/>
    <circle cx="200" cy="200" r="150" fill="none"/>
  </g>

  <!-- Glowing background orb -->
  <circle cx="200" cy="185" r="80" fill="#1fdf64" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Waveform bars — center piece -->
  <g filter="url(#glow)" clip-path="url(#circle)">
    <!-- Bar 1 -->
    <rect x="108" y="168" width="14" height="64" rx="7" fill="url(#accentGrad)" opacity="0.5"/>
    <!-- Bar 2 -->
    <rect x="128" y="148" width="14" height="104" rx="7" fill="url(#accentGrad)" opacity="0.7"/>
    <!-- Bar 3 -->
    <rect x="148" y="132" width="14" height="136" rx="7" fill="url(#accentGrad)" opacity="0.85"/>
    <!-- Bar 4 — tallest, center -->
    <rect x="168" y="118" width="16" height="164" rx="8" fill="url(#accentGrad)"/>
    <!-- Bar 5 — center peak -->
    <rect x="190" y="108" width="18" height="184" rx="9" fill="url(#accentGrad)"/>
    <!-- Bar 6 -->
    <rect x="214" y="118" width="16" height="164" rx="8" fill="url(#accentGrad)"/>
    <!-- Bar 7 -->
    <rect x="236" y="132" width="14" height="136" rx="7" fill="url(#accentGrad)" opacity="0.85"/>
    <!-- Bar 8 -->
    <rect x="256" y="148" width="14" height="104" rx="7" fill="url(#accentGrad)" opacity="0.7"/>
    <!-- Bar 9 -->
    <rect x="276" y="168" width="14" height="64" rx="7" fill="url(#accentGrad)" opacity="0.5"/>
  </g>

  <!-- Download arrow overlay -->
  <g transform="translate(200, 200)" opacity="0.15">
    <polyline points="-22,0 0,26 22,0" fill="none" stroke="#1fdf64" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-28" x2="0" y2="4" stroke="#1fdf64" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Text: SpotiFLAC -->
  <text x="200" y="334" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-0.5">Spoti<tspan fill="#1fdf64">FLAC</tspan></text>

  <!-- Tagline -->
  <text x="200" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#555555" text-anchor="middle" letter-spacing="2">LOSSLESS MUSIC</text>

  <!-- Outer ring accent -->
  <circle cx="200" cy="200" r="193" fill="none" stroke="url(#accentGrad)" stroke-width="0.75" stroke-opacity="0.4" stroke-dasharray="6 4"/>
</svg>
